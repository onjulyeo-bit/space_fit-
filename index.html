<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>집다움 by SpaceFit — 좋은 인테리어엔 순서가 있습니다</title>
  <meta name="description" content="5~7개 질문으로 내 집에 어울리는 인테리어 스타일·예산대·업체군을 진단해 드립니다. 무료." />
  <!-- Pretendard (DESIGN.md 폰트 패밀리) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css?v=9" />
</head>
<body>

  <!-- ===================== TOP NAV ===================== -->
  <header class="top-nav">
    <div class="top-nav__inner container">
      <a class="wordmark" href="#" data-action="restart">집다움<span class="wordmark__by">by SpaceFit</span></a>
      <button class="btn btn--secondary" data-action="restart">처음으로</button>
    </div>
  </header>

  <main>

    <!-- ===================== 1) 랜딩 ===================== -->
    <section id="screen-landing" class="screen is-active">
      <div class="hero color-block color-block--khaki">
        <div class="container hero__inner">
          <p class="eyebrow">집다움 스타일 파인더</p>
          <h1 class="hero__title">좋은 인테리어엔<br />순서가 있습니다</h1>
          <p class="hero__lead subhead">
            저장해둔 사진은 많은데 우리 집은 안 그려지셨다면,
            몇 가지 질문으로 내 집에 맞는 스타일과 예산부터 찾아드립니다.
          </p>
          <button class="btn btn--accent btn--lg hero__cta" data-action="start">
            내 스타일 찾기
          </button>
        </div>
      </div>

    </section>

    <!-- ===================== 2) 진단 (Q1~Q7) ===================== -->
    <section id="screen-quiz" class="screen">
      <div class="container quiz">
        <div class="progress-stepper" id="progress" aria-hidden="true"></div>
        <div class="quiz__head">
          <p class="eyebrow" id="quiz-counter"></p>
          <h2 class="quiz__title" id="quiz-title"></h2>
        </div>
        <div class="choice-grid" id="choice-grid"></div>
        <div class="quiz__nav">
          <button class="btn btn--secondary" id="btn-prev" type="button">이전</button>
          <button class="btn btn--primary" id="btn-next" type="button" disabled>다음</button>
        </div>
      </div>
    </section>

    <!-- ===================== 3) 결과 계산 로딩 ===================== -->
    <section id="screen-loading" class="screen">
      <div class="container loading">
        <span class="spinner" aria-hidden="true"></span>
        <p class="subhead">당신의 집을 읽는 중…</p>
      </div>
    </section>

    <!-- ===================== 4) 결과 리포트 (본문 렌더는 3단계) ===================== -->
    <section id="screen-result" class="screen">
      <div class="container result">
        <div id="result-root"><!-- result.js / quiz.js 가 채움 --></div>
        <button class="btn btn--accent btn--lg result__cta" data-action="to-form">
          전문가 상담 받기
        </button>
      </div>
    </section>

    <!-- ===================== 5) 연락처 폼 (전송은 4단계) ===================== -->
    <section id="screen-form" class="screen">
      <div class="container form">
        <div class="form__head">
          <p class="eyebrow">상담 연결</p>
          <h2 class="headline">진단 결과를 바탕으로 연락드릴게요.</h2>
        </div>
        <form id="lead-form" novalidate>
          <!-- Web3Forms hidden 필드 (값은 js/quiz.js가 config·진단결과로 채움) -->
          <input type="hidden" name="access_key" id="lead-access-key" />
          <input type="hidden" name="subject" value="[집다움] 스타일 진단 상담 신청" />
          <input type="hidden" name="from_name" value="집다움 by SpaceFit" />
          <input type="hidden" name="진단스타일" id="lead-style" />
          <!-- 스팸 방지 허니팟(사람에겐 안 보임) -->
          <input type="checkbox" name="botcheck" id="lead-botcheck" tabindex="-1" autocomplete="off" style="display:none" />

          <div class="form-field">
            <label class="form-label" for="lead-name">이름</label>
            <input class="text-input" id="lead-name" name="이름" type="text" placeholder="성함" required />
          </div>
          <div class="form-field">
            <label class="form-label" for="lead-contact">이메일 또는 연락처</label>
            <input class="text-input" id="lead-contact" name="연락처" type="text" placeholder="이메일 또는 휴대폰 번호" required />
          </div>
          <div class="form-field">
            <label class="form-label" for="lead-memo">한 줄 메모 <span style="font-weight:400">(선택)</span></label>
            <textarea class="text-input" id="lead-memo" name="메모" placeholder="원하시는 점이나 궁금한 점을 적어주세요"></textarea>
          </div>
          <label class="checkbox-row">
            <input type="checkbox" id="lead-agree" required />
            <span class="privacy-note">입력하신 정보는 상담 연결 목적으로만 사용합니다. (동의)</span>
          </label>
          <button class="btn btn--accent btn--lg btn--block" id="lead-submit" type="submit">상담 신청하기</button>
          <p class="form-error" id="lead-error" role="alert" hidden></p>
        </form>
      </div>
    </section>

    <!-- ===================== 6) 완료 ===================== -->
    <section id="screen-done" class="screen">
      <div class="container done">
        <span class="check-glyph" aria-hidden="true">✓</span>
        <h2 class="headline">상담 연결 신청 완료</h2>
        <p class="subhead">곧 연락드릴게요. 감사합니다.</p>
        <button class="btn btn--secondary" data-action="restart">처음으로 돌아가기</button>
      </div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__wordmark">집다움 <span class="footer__by">by SpaceFit</span></p>
      <p class="footer__tagline">업체를 만나기 전에, 내 집의 방향부터.</p>
      <p class="footer__meta">by SpaceFit · 인테리어 스타일 진단 서비스</p>
    </div>
  </footer>

  <script src="js/config.js?v=9"></script>
  <script src="js/result.js?v=9"></script>
  <script src="js/quiz.js?v=9"></script>
  <script src="js/admin-panel.js?v=9"></script><!-- ?admin 일 때만 활성화 -->
</body>
</html>
